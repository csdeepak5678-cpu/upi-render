<!DOCTYPE html>
<html>

<head>
<title>UPI QR Payment</title>
</head>

<body>

<h2>Generate UPI Payment QR</h2>

<input id="amount" placeholder="Enter amount"/>
<input id="upiID" placeholder="Enter UPI ID"/>
<input id="pn" placeholder="Enter Payee Name"/>

<button onclick="createQR()">Generate QR</button>

<div id="result"></div>

<script>

async function createQR(){

const amount=document.getElementById("amount").value
const upiID=document.getElementById("upiID").value ?? '';
const pn=document.getElementById("pn").value ?? '';
if(!amount || !upiID){
alert("Please enter amount and UPI ID")
return
}

const res=await fetch(`/api/generate?amount=${amount}&upiId=${upiID}&pn=${pn}`)

const data=await res.json()

document.getElementById("result").innerHTML=
`
<h3>Transaction: ${data.txnId}</h3>
<img src="${data.qr}" width="250">
<p>Amount ₹ ${data.amount}</p>
`

}

</script>

</body>

</html>
